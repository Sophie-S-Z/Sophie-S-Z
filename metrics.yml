# Generates the isometric commit calendar + language stats (github-metrics.svg).
# Place this file at: .github/workflows/metrics.yml
# One-time setup (see SETUP.md): create a classic PAT and save it as a repo
# secret named METRICS_TOKEN.
name: Metrics

on:
  # Rebuilds daily at 00:00 America/New_York-ish, plus on demand
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # The PAT you stored as a secret (NOT the built-in GITHUB_TOKEN)
          token: ${{ secrets.METRICS_TOKEN }}
          user: Sophie-S-Z
          filename: github-metrics.svg

          # Look & feel
          template: classic
          config_timezone: America/New_York
          base: header, activity, community, repositories, metadata

          # ✨ the isometric 3D commit calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # language breakdown
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
