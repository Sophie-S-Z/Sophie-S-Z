# Generates the isometric commit calendar + language stats (github-metrics.svg).
# MUST live at: .github/workflows/metrics.yml   (NOT the repo root)
# One-time setup: create a classic PAT and save it as a repo secret named METRICS_TOKEN.
name: Metrics

on:
  schedule:
    - cron: "0 4 * * *"   # daily rebuild
  workflow_dispatch:        # lets you run it manually from the Actions tab
  # NOTE: no "push" trigger on purpose — the action commits github-metrics.svg
  # back to main, and a push trigger would make it re-run itself in a loop.

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Sophie-S-Z
          filename: github-metrics.svg

          template: classic
          config_timezone: America/New_York
          base: header, activity, community, repositories, metadata

          # ✨ the isometric 3D commit calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # language breakdown
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
